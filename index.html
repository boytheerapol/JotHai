<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JotHai Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            padding: 15px;
            font-family: "Kanit", sans-serif;
            background: #f4f7f6;
            color: #333;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #1DB446;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }

        h2 {
            text-align: center;
            font-size: 18px;
            color: #555;
            margin-top: 0;
        }

        /* ระบบ Tabs */
        .tabs {
            display: flex;
            margin-bottom: 20px;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            color: #888;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: #1DB446;
            color: #fff;
        }

        /* ตัวกรอง (Filters) */
        .filter-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .filter-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: "Kanit";
            font-size: 14px;
        }

        .btn {
            padding: 10px 20px;
            background: #1DB446;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: "Kanit";
            font-weight: 500;
        }

        /* Dashboard Styles */
        .summary-box {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .summary-item {
            text-align: center;
            width: 48%;
            padding: 15px 0;
            border-radius: 8px;
            background: #fafafa;
        }

        .income-text {
            color: #1DB446;
            font-size: 20px;
            font-weight: bold;
            margin-top: 5px;
        }

        .expense-text {
            color: #f44336;
            font-size: 20px;
            font-weight: bold;
            margin-top: 5px;
        }

        .chart-container {
            position: relative;
            height: 220px;
            width: 100%;
            margin-bottom: 20px;
        }

        /* Entry List Styles (แท็บรายการ) */
        .entry-card {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            border-left: 4px solid #ccc;
        }

        .entry-card.expense {
            border-left-color: #f44336;
        }

        .entry-card.income {
            border-left-color: #1DB446;
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .entry-desc {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .entry-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn-small {
            padding: 5px 12px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-family: "Kanit";
            font-size: 12px;
            color: white;
        }

        .btn-edit {
            background: #f0ad4e;
        }

        .btn-delete {
            background: #f44336;
        }

        .btn-undo {
            background: #607d8b;
            width: 100%;
            padding: 10px;
        }

        /* ฟอร์มแก้ไข */
        .edit-form {
            display: none;
            flex-direction: column;
            gap: 8px;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
        }

        .edit-form input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: "Kanit";
        }

        #loading {
            text-align: center;
            color: #888;
            margin: 30px 0;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📊 สรุปการเงินของคุณ</h1>

        <div class="tabs">
            <div class="tab-btn active" onclick="switchTab('dashboard')">📈 แดชบอร์ด</div>
            <div class="tab-btn" onclick="switchTab('entries')">📝 รายการ</div>
        </div>

        <div class="card">
            <div class="filter-group">
                <input type="month" id="month-picker">
                <button class="btn" onclick="loadData()">ค้นหา</button>
            </div>
            <div class="filter-group" id="hashtag-container">
                <input type="text" id="hashtag-filter" placeholder="เช่น อาหาร, ขนม">
            </div>
        </div>

        <div id="loading">⏳ กำลังประมวลผลข้อมูล...</div>

        <div id="dashboard-tab" style="display: none;">
            <div class="summary-box">
                <div class="summary-item">
                    <div style="font-size: 14px; color: #666;">รายรับรวม</div>
                    <div class="income-text" id="total-income">฿0</div>
                </div>
                <div class="summary-item">
                    <div style="font-size: 14px; color: #666;">รายจ่ายรวม</div>
                    <div class="expense-text" id="total-expense">฿0</div>
                </div>
            </div>
            <div class="card">
                <h2>สัดส่วน รายรับ-รายจ่าย</h2>
                <div class="chart-container"><canvas id="overviewChart"></canvas></div>
            </div>
            <div class="card">
                <h2>วิเคราะห์รายจ่าย</h2>
                <div class="chart-container"><canvas id="expenseChart"></canvas></div>
            </div>
            <div class="card">
                <h2>วิเคราะห์รายรับ</h2>
                <div class="chart-container"><canvas id="incomeChart"></canvas></div>
            </div>
        </div>

        <div id="entries-tab" style="display: none;">
            <div id="entries-list"></div>
        </div>
    </div>

    <script>
        const LIFF_ID = "2010529543-LkVEFzhx";

        // ⚠️ นำ Web App URL ของ Google Apps Script มาใส่ตรงนี้ครับ ⚠️
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyfh7wTfcOue6G7xStHmBTzTFrVlyeNepjj193x089dWE3GII7lWquV101SRoQITqDw/exec";

        let userId = "";
        let idToken = "";
        let charts = {};

        const now = new Date();
        document.getElementById('month-picker').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

        async function main() {
            await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                userId = profile.userId;
                idToken = liff.getIDToken(); // ดึงกุญแจสำคัญสำหรับแก้ไข/ลบ
                loadData();
            } else {
                liff.login();
            }
        }

        // --- ระบบสลับแท็บ ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('dashboard-tab').style.display = 'none';
            document.getElementById('entries-tab').style.display = 'none';
            document.getElementById(`${tabId}-tab`).style.display = 'block';

            // ซ่อนช่องค้นหา Hashtag ถ้าย้ายมารายการ (เพราะเราเน้นลิสต์ทั้งหมดของเดือน)
            document.getElementById('hashtag-container').style.display = (tabId === 'dashboard') ? 'flex' : 'none';
        }

        // --- โหลดข้อมูล (ดึงทั้ง 2 หน้าต่าง) ---
        async function loadData() {
            const month = document.getElementById('month-picker').value;
            const hashtag = document.getElementById('hashtag-filter').value.trim();

            document.getElementById('loading').style.display = 'block';
            document.getElementById('dashboard-tab').style.display = 'none';
            document.getElementById('entries-tab').style.display = 'none';

            try {
                // ยิง Fetch 2 เส้นพร้อมกัน (Overview และ List) เพื่อความรวดเร็ว
                const overviewUrl = `${GAS_URL}?api=overview&userId=${userId}&month=${month}${hashtag ? '&hashtag=' + encodeURIComponent(hashtag) : ''}`;
                const listUrl = `${GAS_URL}?api=list&userId=${userId}&month=${month}`;

                const [resOverview, resList] = await Promise.all([fetch(overviewUrl), fetch(listUrl)]);
                const dataOverview = await resOverview.json();
                const dataList = await resList.json();

                if (dataOverview.status === 'success') renderDashboard(dataOverview.data);
                if (dataList.status === 'success') renderEntriesList(dataList.data);

                // แสดงแท็บที่เลือกอยู่
                const activeTab = document.querySelector('.tab-btn.active').innerText.includes('รายการ') ? 'entries' : 'dashboard';
                document.getElementById(`${activeTab}-tab`).style.display = 'block';
            } catch (error) {
                console.error(error);
                alert('เกิดข้อผิดพลาดในการดึงข้อมูล');
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // --- เรนเดอร์แท็บ: รายการ ---
        function renderEntriesList(entries) {
            const listEl = document.getElementById('entries-list');
            listEl.innerHTML = '';

            if (entries.length === 0) {
                listEl.innerHTML = '<div style="text-align:center; color:#999; padding:20px;">ไม่มีรายการจดบันทึกในเดือนนี้</div>';
                return;
            }

            entries.forEach(entry => {
                const isExpense = (entry.type === 'รายจ่าย' || entry.type === 'expense');
                const colorClass = isExpense ? 'expense' : 'income';
                const dateStr = new Date(entry.timestamp).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });

                const html = `
          <div class="entry-card ${colorClass}" id="card-${entry.row_index}">
            <div id="view-${entry.row_index}">
              <div class="entry-header">
                <span>${dateStr} | <span id="lbl-cat-${entry.row_index}">${entry.category}</span></span>
                <span style="color: ${isExpense ? '#f44336' : '#1DB446'}">฿<span id="lbl-amt-${entry.row_index}">${entry.amount.toLocaleString()}</span></span>
              </div>
              <div class="entry-desc" id="lbl-desc-${entry.row_index}">${entry.description}</div>
              <div class="entry-actions">
                <button class="btn-small btn-edit" onclick="toggleEdit(${entry.row_index})">แก้ไข</button>
                <button class="btn-small btn-delete" onclick="mutateEntry(${entry.row_index}, 'delete')">ลบ</button>
              </div>
            </div>
            
            <div class="edit-form" id="edit-${entry.row_index}">
              <input type="number" id="inp-amt-${entry.row_index}" value="${entry.amount}" placeholder="จำนวนเงิน">
              <input type="text" id="inp-desc-${entry.row_index}" value="${entry.description}" placeholder="รายละเอียด">
              <input type="text" id="inp-cat-${entry.row_index}" value="${entry.category}" placeholder="หมวดหมู่">
              <div class="entry-actions" style="margin-top: 5px;">
                <button class="btn-small" style="background:#999;" onclick="toggleEdit(${entry.row_index})">ยกเลิก</button>
                <button class="btn-small btn-edit" onclick="saveEdit(${entry.row_index})">บันทึก</button>
              </div>
            </div>

            <div id="undo-${entry.row_index}" style="display:none; text-align:center;">
              <div style="color:#f44336; margin-bottom:10px; font-size:14px;">ลบรายการนี้แล้ว</div>
              <button class="btn-small btn-undo" onclick="mutateEntry(${entry.row_index}, 'undo')">↩️ กดเพื่อเลิกทำ (Undo)</button>
            </div>
          </div>
        `;
                listEl.insertAdjacentHTML('beforeend', html);
            });
        }

        function toggleEdit(rowIdx) {
            const viewEl = document.getElementById(`view-${rowIdx}`);
            const editEl = document.getElementById(`edit-${rowIdx}`);
            if (viewEl.style.display === 'none') {
                viewEl.style.display = 'block'; editEl.style.display = 'none';
            } else {
                viewEl.style.display = 'none'; editEl.style.display = 'flex';
            }
        }

        // --- ระบบยิง POST (แก้ไข / ลบ / เลิกทำ) ---
        async function mutateEntry(rowIndex, action, payload = {}) {
            if (action === 'delete' && !confirm('แน่ใจหรือไม่ที่จะลบรายการนี้?')) return;

            try {
                // ใช้เทคนิค text/plain เพื่อหลบ CORS กฎเหล็กของ GAS
                const postData = { idToken: idToken, action: action, payload: { row_index: rowIndex, ...payload } };
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(postData)
                });

                const result = await response.json();

                if (result.status === 'success') {
                    // อัปเดต UI ทันทีโดยไม่ต้องโหลดหน้าเว็บใหม่
                    if (action === 'delete') {
                        document.getElementById(`view-${rowIndex}`).style.display = 'none';
                        document.getElementById(`edit-${rowIndex}`).style.display = 'none';
                        document.getElementById(`undo-${rowIndex}`).style.display = 'block';
                    } else if (action === 'undo') {
                        document.getElementById(`undo-${rowIndex}`).style.display = 'none';
                        document.getElementById(`view-${rowIndex}`).style.display = 'block';
                    } else if (action === 'edit') {
                        document.getElementById(`lbl-amt-${rowIndex}`).innerText = parseFloat(payload.amount).toLocaleString();
                        document.getElementById(`lbl-desc-${rowIndex}`).innerText = payload.description;
                        document.getElementById(`lbl-cat-${rowIndex}`).innerText = payload.category;
                        toggleEdit(rowIndex);
                    }
                    // โหลดกราฟหน้าแดชบอร์ดใหม่แบบเงียบๆ (ซิงก์ข้อมูลให้ตรงกัน)
                    silentRefreshOverview();
                } else {
                    alert('ผิดพลาด: ' + result.message);
                }
            } catch (err) {
                alert('การเชื่อมต่อล้มเหลว กรุณาลองใหม่');
            }
        }

        function saveEdit(rowIdx) {
            const amt = document.getElementById(`inp-amt-${rowIdx}`).value;
            const desc = document.getElementById(`inp-desc-${rowIdx}`).value;
            const cat = document.getElementById(`inp-cat-${rowIdx}`).value;
            mutateEntry(rowIdx, 'edit', { amount: parseFloat(amt), description: desc, category: cat });
        }

        // โหลดแดชบอร์ดซ้ำเงียบๆ หลังมีการอัปเดตข้อมูล
        async function silentRefreshOverview() {
            const month = document.getElementById('month-picker').value;
            const overviewUrl = `${GAS_URL}?api=overview&userId=${userId}&month=${month}`;
            const res = await fetch(overviewUrl);
            const data = await res.json();
            if (data.status === 'success') renderDashboard(data.data);
        }

        // --- เรนเดอร์แท็บ: แดชบอร์ด (กราฟเดิม) ---
        function renderDashboard(data) {
            document.getElementById('total-income').innerText = '฿' + data.incomeTotal.toLocaleString('th-TH');
            document.getElementById('total-expense').innerText = '฿' + data.expenseTotal.toLocaleString('th-TH');
            const colors = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#8AC926', '#1982C4'];
            createDonutChart('overviewChart', ['รายรับ', 'รายจ่าย'], [data.incomeTotal, data.expenseTotal], ['#1DB446', '#f44336']);
            createDonutChart('expenseChart', Object.keys(data.expensesByCategory), Object.values(data.expensesByCategory), colors);
            createDonutChart('incomeChart', Object.keys(data.incomesByCategory), Object.values(data.incomesByCategory), colors);
        }

        function createDonutChart(canvasId, labels, data, bgColors) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            if (charts[canvasId]) charts[canvasId].destroy();
            if (data.length === 0 || data.every(v => v === 0)) { labels = ['ไม่มีข้อมูล']; data = [1]; bgColors = ['#e0e0e0']; }
            charts[canvasId] = new Chart(ctx, { type: 'doughnut', data: { labels: labels, datasets: [{ data: data, backgroundColor: bgColors }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { family: 'Kanit' } } } } } });
        }

        window.onload = main;
    </script>
</body>

</html>
