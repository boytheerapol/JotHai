<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JotHai Expense Report</title>

    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            /* Brand */
            --color-brand: #7C3AED;
            --color-brand-hover: #6D28D9;
            --color-brand-subtle: #F1EBFE;
            --color-brand-on: #FFFFFF;

            /* Accent */
            --color-accent-lime: #A3E635;
            --color-accent-pink: #F472B6;

            /* Semantic — fill vs text */
            --color-income-fill: #16C784;
            --color-income-text: #0F7A4A;
            --color-expense-fill: #FF5C7C;
            --color-expense-text: #CB2A30;
            --color-warning-fill: #FFF3CD;
            --color-warning-text: #8A6100;
            --color-info: #2B6BFF;

            /* Neutrals */
            --color-bg: #F7F5FF;
            --color-surface: #FFFFFF;
            --color-surface-alt: #FAFAFE;
            --color-border: #E6E1F0;
            --color-text-primary: #1A1523;
            --color-text-secondary: #4B4458;
            --color-text-muted: #6E6880;

            /* Typography */
            --text-display: 700 32px/40px "Kanit", sans-serif;
            --text-title: 600 24px/32px "Kanit", sans-serif;
            --text-heading: 600 18px/26px "Kanit", sans-serif;
            --text-body: 400 16px/24px "Kanit", sans-serif;
            --text-label: 500 14px/20px "Kanit", sans-serif;
            --text-caption: 400 12px/16px "Kanit", sans-serif;

            /* Spacing (4px base) */
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --space-10: 40px;

            /* Radius */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-pill: 999px;

            /* Elevation (violet-tinted) */
            --shadow-sm: 0 1px 2px rgba(26, 21, 35, 0.06);
            --shadow-md: 0 4px 14px rgba(124, 58, 237, 0.10);
            --shadow-lg: 0 10px 28px rgba(124, 58, 237, 0.16);

            /* Motion */
            --motion-fast: 120ms;
            --motion-base: 200ms;
            --motion-slow: 320ms;
            --ease-standard: cubic-bezier(0.2, 0, 0, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-out: cubic-bezier(0, 0, 0.2, 1);
        }

        body {
            margin: 0;
            padding: var(--space-4);
            font: var(--text-body);
            background: var(--color-bg);
            color: var(--color-text-primary);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--color-text-primary);
            margin-bottom: var(--space-4);
            font: var(--text-title);
        }

        .card {
            background: var(--color-surface);
            padding: var(--space-5);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: var(--space-5);
        }

        h2 {
            text-align: center;
            font: var(--text-heading);
            color: var(--color-text-secondary);
            margin-top: 0;
        }

        .tabs {
            position: relative;
            display: flex;
            margin-bottom: var(--space-5);
            background: var(--color-surface);
            border-radius: var(--radius-pill);
            padding: var(--space-1);
            box-shadow: var(--shadow-sm);
        }

        .tab-indicator {
            position: absolute;
            top: var(--space-1);
            left: var(--space-1);
            width: calc(50% - var(--space-1));
            height: calc(100% - 2 * var(--space-1));
            background: var(--color-brand);
            border-radius: var(--radius-pill);
            transition: transform var(--motion-base) var(--ease-standard);
            z-index: 0;
        }

        .tab-btn {
            position: relative;
            z-index: 1;
            flex: 1;
            padding: var(--space-3);
            text-align: center;
            cursor: pointer;
            font: var(--text-label);
            color: var(--color-text-secondary);
            transition: color var(--motion-base) var(--ease-standard),
                transform var(--motion-fast) var(--ease-spring);
        }

        .tab-btn.active {
            color: var(--color-brand-on);
        }

        .tab-btn:active {
            transform: scale(0.96);
        }

        .filter-group {
            display: flex;
            gap: var(--space-3);
            margin-bottom: var(--space-3);
        }

        .filter-group input {
            flex: 1;
            padding: var(--space-3);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font: var(--text-label);
            background: var(--color-surface-alt);
            color: var(--color-text-primary);
        }

        .filter-group input:focus {
            outline: none;
            border-color: var(--color-brand);
            box-shadow: 0 0 0 2px var(--color-brand-subtle);
        }

        .btn {
            padding: var(--space-3) var(--space-5);
            background: var(--color-brand);
            color: var(--color-brand-on);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font: var(--text-label);
            transition: background var(--motion-fast) var(--ease-standard),
                transform var(--motion-fast) var(--ease-spring);
        }

        .btn:hover {
            background: var(--color-brand-hover);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .summary-box {
            display: flex;
            justify-content: space-between;
            margin-bottom: var(--space-5);
        }

        .summary-item {
            text-align: center;
            width: 48%;
            padding: var(--space-4) 0 0;
            border-radius: var(--radius-lg);
            background: var(--color-surface);
            box-shadow: var(--shadow-md);
            border-top: 3px solid transparent;
            overflow: hidden;
        }

        .summary-item.income {
            border-top-color: var(--color-income-fill);
        }

        .summary-item.expense {
            border-top-color: var(--color-expense-fill);
        }

        .summary-label {
            font: var(--text-label);
            color: var(--color-text-secondary);
        }

        .income-text {
            color: var(--color-income-text);
            font: var(--text-title);
            margin-top: var(--space-1);
            padding-bottom: var(--space-4);
        }

        .expense-text {
            color: var(--color-expense-text);
            font: var(--text-title);
            margin-top: var(--space-1);
            padding-bottom: var(--space-4);
        }

        .chart-container {
            position: relative;
            height: 220px;
            width: 100%;
            margin-bottom: var(--space-5);
        }

        .entry-card {
            background: var(--color-surface);
            padding: var(--space-4);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-3);
            box-shadow: var(--shadow-sm);
            border-left: 4px solid var(--color-border);
            animation: entry-in var(--motion-slow) var(--ease-out) both;
        }

        @keyframes entry-in {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .entry-card.expense {
            border-left-color: var(--color-expense-fill);
        }

        .entry-card.income {
            border-left-color: var(--color-income-fill);
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            font: var(--text-label);
            color: var(--color-text-primary);
            margin-bottom: var(--space-1);
        }

        .entry-desc {
            color: var(--color-text-muted);
            font: var(--text-label);
            margin-bottom: var(--space-3);
        }

        .entry-actions {
            display: flex;
            gap: var(--space-2);
            justify-content: flex-end;
        }

        .btn-small {
            padding: var(--space-1) var(--space-3);
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            font: var(--text-caption);
            transition: transform var(--motion-fast) var(--ease-spring),
                background var(--motion-fast) var(--ease-standard);
        }

        .btn-small:active {
            transform: scale(0.96);
        }

        /* Secondary variant — surface + border, brand text */
        .btn-edit {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            color: var(--color-brand);
        }

        /* Danger variant — deliberate deviation from §7.4: this button is small (12px),
           so white-on-expense-fill (2.97:1) fails AA. Use the darker expense-text tier
           (white-on-#CB2A30 = 5.37:1, AA pass) as the fill for legibility. */
        .btn-delete {
            background: var(--color-expense-text);
            color: var(--color-brand-on);
        }

        /* Ghost variant — transparent, secondary text */
        .btn-ghost {
            background: transparent;
            color: var(--color-text-secondary);
        }

        /* Undo variant — surface + border, secondary text */
        .btn-undo {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            color: var(--color-text-secondary);
            width: 100%;
            padding: var(--space-3);
        }

        .edit-form {
            display: none;
            flex-direction: column;
            gap: var(--space-3);
            background: var(--color-surface-alt);
            padding: var(--space-3);
            border-radius: var(--radius-md);
            margin-top: var(--space-3);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .form-group label {
            font: var(--text-label);
            color: var(--color-text-secondary);
            margin-bottom: var(--space-1);
        }

        .form-group input,
        .form-group select {
            padding: var(--space-2);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font: var(--text-label);
            background: var(--color-surface-alt);
            color: var(--color-text-primary);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--color-brand);
            box-shadow: 0 0 0 2px var(--color-brand-subtle);
        }

        #loading {
            text-align: center;
            color: var(--color-text-muted);
            margin: var(--space-8) 0;
            font: var(--text-body);
        }

        /* SweetAlert2 — JotHai theme (§7.8) */
        .swal2-popup.jothai-swal {
            font-family: "Kanit", sans-serif;
            border-radius: var(--radius-lg);
        }

        .swal2-popup.jothai-swal.swal2-toast {
            border-left: 4px solid var(--color-brand);
        }

        .swal2-icon.swal2-success {
            border-color: var(--color-income-fill);
            color: var(--color-income-fill);
        }

        .swal2-icon.swal2-success [class^='swal2-success-line'] {
            background-color: var(--color-income-fill);
        }

        .swal2-icon.swal2-error {
            border-color: var(--color-expense-fill);
            color: var(--color-expense-fill);
        }

        .swal2-icon.swal2-error [class^='swal2-x-mark-line'] {
            background-color: var(--color-expense-fill);
        }

        @keyframes jothai-toast-show {
            from {
                opacity: 0;
                transform: translate(24px, -16px);
            }

            to {
                opacity: 1;
                transform: translate(0, 0);
            }
        }

        .jothai-toast-show {
            animation: jothai-toast-show var(--motion-base) var(--ease-spring);
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: .01ms !important;
                transition-duration: .01ms !important;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📊 สรุปการเงินของคุณ</h1>

        <div class="tabs">
            <div class="tab-indicator" id="tab-indicator"></div>
            <div class="tab-btn active" onclick="switchTab('dashboard')">📈 แดชบอร์ด</div>
            <div class="tab-btn" onclick="switchTab('entries')">📝 รายการ</div>
        </div>

        <div class="card">
            <div class="filter-group">
                <input type="month" id="month-picker">
                <button class="btn" onclick="loadData()">ค้นหา</button>
            </div>
            <div class="filter-group" id="hashtag-container">
                <input type="text" id="hashtag-filter" placeholder="เช่น อาหาร, ขนม">
            </div>
        </div>

        <div id="loading">⏳ กำลังประมวลผลข้อมูล...</div>

        <div id="dashboard-tab" style="display: none;">
            <div class="summary-box">
                <div class="summary-item income">
                    <div class="summary-label">รายรับรวม</div>
                    <div class="income-text" id="total-income">฿0</div>
                </div>
                <div class="summary-item expense">
                    <div class="summary-label">รายจ่ายรวม</div>
                    <div class="expense-text" id="total-expense">฿0</div>
                </div>
            </div>
            <div class="card">
                <h2>สัดส่วน รายรับ-รายจ่าย</h2>
                <div class="chart-container"><canvas id="overviewChart"></canvas></div>
            </div>
            <div class="card">
                <h2>วิเคราะห์รายจ่าย</h2>
                <div class="chart-container"><canvas id="expenseChart"></canvas></div>
            </div>
            <div class="card">
                <h2>วิเคราะห์รายรับ</h2>
                <div class="chart-container"><canvas id="incomeChart"></canvas></div>
            </div>
        </div>

        <div id="entries-tab" style="display: none;">
            <div id="entries-list"></div>
        </div>
    </div>

    <script>
        const LIFF_ID = "2010529543-LkVEFzhx";

        // ⚠️ นำ Web App URL ของ Google Apps Script มาใส่ตรงนี้ ⚠️
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyfh7wTfcOue6G7xStHmBTzTFrVlyeNepjj193x089dWE3GII7lWquV101SRoQITqDw/exec";

        // เปลี่ยนจาก const ถาวร เป็น let ว่างๆ เพื่อรอรับค่าจาก Google Sheets
        let dynamicCategories = [];

        let userId = "";
        let idToken = "";
        let charts = {};

        // Design-system tokens that JS needs as raw values (mirror docs/design-system.md §2)
        const REDUCED_MOTION = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        // Categorical palette for category/hashtag donuts (NOT income-vs-expense)
        const CHART_PALETTE = [
            '#7C3AED', '#16C784', '#FF5C7C', '#2B6BFF',
            '#A3E635', '#F472B6', '#F0A020', '#14B8C4',
        ];
        const CHART_EMPTY = '#E6E1F0';
        const COLOR_INCOME_FILL = '#16C784';
        const COLOR_EXPENSE_FILL = '#FF5C7C';

        // Chart.js global defaults — Kanit everywhere (§7.9)
        Chart.defaults.font.family = 'Kanit';

        // Shared SweetAlert2 theme — define once, never re-style per call (§7.8)
        const Swal2 = Swal.mixin({
            confirmButtonColor: '#7C3AED',
            customClass: { popup: 'jothai-swal' },
        });
        // Toast preset — spring slide-in from top-end (§6)
        const Toast = Swal2.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 1500,
            showClass: { popup: 'jothai-toast-show' },
        });

        const now = new Date();
        document.getElementById('month-picker').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

        async function main() {
            await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true });
            if (liff.isLoggedIn()) {
                userId = (await liff.getProfile()).userId;
                idToken = liff.getIDToken();
                loadData();
            } else {
                liff.login();
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            // Slide the active pill to the selected tab (§6 tab switch)
            const idx = (tabId === 'dashboard') ? 0 : 1;
            document.getElementById('tab-indicator').style.transform = `translateX(${idx * 100}%)`;
            document.getElementById('dashboard-tab').style.display = 'none';
            document.getElementById('entries-tab').style.display = 'none';
            document.getElementById(`${tabId}-tab`).style.display = 'block';
            document.getElementById('hashtag-container').style.display = (tabId === 'dashboard') ? 'flex' : 'none';
        }

        // Count-up animation for money amounts (§6); animates from the currently shown value
        function animateCount(el, target) {
            const start = Number(String(el.innerText).replace(/[^\d.-]/g, '')) || 0;
            const fmt = (v) => '฿' + Math.round(v).toLocaleString('th-TH');
            if (REDUCED_MOTION || start === target) { el.innerText = fmt(target); return; }
            const duration = 320; // --motion-slow
            const t0 = performance.now();
            function step(now) {
                const p = Math.min((now - t0) / duration, 1);
                const eased = 1 - Math.pow(1 - p, 3); // ease-out
                el.innerText = fmt(start + (target - start) * eased);
                if (p < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        async function loadData() {
            const month = document.getElementById('month-picker').value;
            const hashtag = document.getElementById('hashtag-filter').value.trim();

            document.getElementById('loading').style.display = 'block';
            document.getElementById('dashboard-tab').style.display = 'none';
            document.getElementById('entries-tab').style.display = 'none';

            try {
                const overviewUrl = `${GAS_URL}?api=overview&userId=${userId}&month=${month}${hashtag ? '&hashtag=' + encodeURIComponent(hashtag) : ''}`;
                const listUrl = `${GAS_URL}?api=list&userId=${userId}&month=${month}`;

                const [resOverview, resList] = await Promise.all([fetch(overviewUrl), fetch(listUrl)]);
                const dataOverview = await resOverview.json();
                const dataList = await resList.json();

                if (dataOverview.status === 'success') {
                    renderDashboard(dataOverview.data);
                }

                if (dataList.status === 'success') {
                    // นำหมวดหมู่ที่ส่งมาจากหลังบ้าน มาเก็บไว้ในตัวแปร
                    dynamicCategories = dataList.categories || [];
                    renderEntriesList(dataList.data);
                }

                const activeTab = document.querySelector('.tab-btn.active').innerText.includes('รายการ') ? 'entries' : 'dashboard';
                document.getElementById(`${activeTab}-tab`).style.display = 'block';
            } catch (error) {
                console.error(error);
                Swal2.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: 'ไม่สามารถดึงข้อมูลได้' });
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderEntriesList(entries) {
            const listEl = document.getElementById('entries-list');
            listEl.innerHTML = '';

            if (entries.length === 0) {
                listEl.innerHTML = '<div style="text-align:center; color:var(--color-text-muted); padding:var(--space-5);">ยังไม่มีรายการเดือนนี้เลยนะคะ ✨ ลองพิมพ์ \'กาแฟ 50\' ดูสิ</div>';
                return;
            }

            entries.forEach((entry, i) => {
                const isExpense = (entry.type === 'รายจ่าย' || entry.type === 'expense');
                const colorClass = isExpense ? 'expense' : 'income';
                const dateStr = new Date(entry.timestamp).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });

                // ใช้ตัวแปร dynamicCategories ในการสร้างตัวเลือก (Dropdown)
                let catOptions = dynamicCategories.map(c => `<option value="${c}" ${c === entry.category ? 'selected' : ''}>${c}</option>`).join('');

                // ถ้าหมวดหมู่เก่าของรายการนั้น ไม่มีอยู่ในลิสต์ปัจจุบัน (เช่น เคยมีหมวดนี้แล้วลบทิ้ง) ให้แถมเข้าไปด้วย จะได้ไม่เด้งเพี้ยน
                if (!dynamicCategories.includes(entry.category)) {
                    catOptions += `<option value="${entry.category}" selected>${entry.category}</option>`;
                }

                const html = `
          <div class="entry-card ${colorClass}" id="card-${entry.row_index}" style="animation-delay: calc(40ms * ${i})">
            <div id="view-${entry.row_index}">
              <div class="entry-header">
                <span>${dateStr} | <span id="lbl-cat-${entry.row_index}">${entry.category}</span></span>
                <span style="color: ${isExpense ? 'var(--color-expense-text)' : 'var(--color-income-text)'}">฿<span id="lbl-amt-${entry.row_index}">${entry.amount.toLocaleString()}</span></span>
              </div>
              <div class="entry-desc" id="lbl-desc-${entry.row_index}">${entry.description}</div>
              <div class="entry-actions">
                <button class="btn-small btn-edit" onclick="toggleEdit(${entry.row_index})">แก้ไข</button>
                <button class="btn-small btn-delete" onclick="mutateEntry(${entry.row_index}, 'delete')">ลบ</button>
              </div>
            </div>
            
            <div class="edit-form" id="edit-${entry.row_index}">
              <div class="form-group">
                <label>จำนวนเงิน (บาท)</label>
                <input type="number" id="inp-amt-${entry.row_index}" value="${entry.amount}">
              </div>
              <div class="form-group">
                <label>รายละเอียด</label>
                <input type="text" id="inp-desc-${entry.row_index}" value="${entry.description}">
              </div>
              <div class="form-group">
                <label>หมวดหมู่</label>
                <select id="inp-cat-${entry.row_index}">
                  ${catOptions}
                </select>
              </div>
              <div class="entry-actions" style="margin-top: var(--space-3);">
                <button class="btn-small btn-ghost" onclick="toggleEdit(${entry.row_index})">ยกเลิก</button>
                <button class="btn-small btn" onclick="saveEdit(${entry.row_index})">บันทึก</button>
              </div>
            </div>

            <div id="undo-${entry.row_index}" style="display:none; text-align:center;">
              <div style="color:var(--color-expense-text); margin-bottom:var(--space-3); font:var(--text-label);">ลบรายการนี้แล้ว</div>
              <button class="btn-small btn-undo" onclick="mutateEntry(${entry.row_index}, 'undo')">↩️ กดเพื่อเลิกทำ (Undo)</button>
            </div>
          </div>
        `;
                listEl.insertAdjacentHTML('beforeend', html);
            });
        }

        function toggleEdit(rowIdx) {
            const viewEl = document.getElementById(`view-${rowIdx}`);
            const editEl = document.getElementById(`edit-${rowIdx}`);
            if (viewEl.style.display === 'none') {
                viewEl.style.display = 'block'; editEl.style.display = 'none';
            } else {
                viewEl.style.display = 'none'; editEl.style.display = 'flex';
            }
        }

        async function mutateEntry(rowIndex, action, payload = {}) {
            if (action === 'delete') {
                const result = await Swal2.fire({
                    title: 'ยืนยันการลบ?',
                    text: "คุณสามารถกดเลิกทำ (Undo) ได้ภายหลัง",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#FF5C7C', // Danger override — destructive ≠ primary (§7.4)
                    confirmButtonText: 'ใช่, ลบรายการ',
                    cancelButtonText: 'ยกเลิก',
                    reverseButtons: true
                });
                if (!result.isConfirmed) return;
            }

            try {
                const postData = { idToken: idToken, action: action, payload: { row_index: rowIndex, ...payload } };
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(postData)
                });

                const result = await response.json();

                if (result.status === 'success') {
                    if (action === 'delete') {
                        document.getElementById(`view-${rowIndex}`).style.display = 'none';
                        document.getElementById(`edit-${rowIndex}`).style.display = 'none';
                        document.getElementById(`undo-${rowIndex}`).style.display = 'block';
                    } else if (action === 'undo') {
                        document.getElementById(`undo-${rowIndex}`).style.display = 'none';
                        document.getElementById(`view-${rowIndex}`).style.display = 'block';
                    } else if (action === 'edit') {
                        document.getElementById(`lbl-amt-${rowIndex}`).innerText = parseFloat(payload.amount).toLocaleString();
                        document.getElementById(`lbl-desc-${rowIndex}`).innerText = payload.description;
                        document.getElementById(`lbl-cat-${rowIndex}`).innerText = payload.category;
                        toggleEdit(rowIndex);

                        Toast.fire({ icon: 'success', title: 'บันทึกสำเร็จ' });
                    }
                    silentRefreshOverview();
                } else {
                    Swal2.fire({ icon: 'error', title: 'ผิดพลาด', text: result.message });
                }
            } catch (err) {
                Swal2.fire({ icon: 'error', title: 'ขาดการเชื่อมต่อ', text: 'กรุณาลองใหม่อีกครั้ง' });
            }
        }

        function saveEdit(rowIdx) {
            const amt = document.getElementById(`inp-amt-${rowIdx}`).value;
            const desc = document.getElementById(`inp-desc-${rowIdx}`).value;
            const cat = document.getElementById(`inp-cat-${rowIdx}`).value;
            mutateEntry(rowIdx, 'edit', { amount: parseFloat(amt), description: desc, category: cat });
        }

        async function silentRefreshOverview() {
            const month = document.getElementById('month-picker').value;
            const overviewUrl = `${GAS_URL}?api=overview&userId=${userId}&month=${month}`;
            const res = await fetch(overviewUrl);
            const data = await res.json();
            if (data.status === 'success') renderDashboard(data.data);
        }

        function renderDashboard(data) {
            animateCount(document.getElementById('total-income'), data.incomeTotal);
            animateCount(document.getElementById('total-expense'), data.expenseTotal);
            // Overview donut keeps fixed income/expense semantic fills — never the categorical palette (§7.9)
            createDonutChart('overviewChart', ['รายรับ', 'รายจ่าย'], [data.incomeTotal, data.expenseTotal], [COLOR_INCOME_FILL, COLOR_EXPENSE_FILL]);
            createDonutChart('expenseChart', Object.keys(data.expensesByCategory), Object.values(data.expensesByCategory), CHART_PALETTE);
            createDonutChart('incomeChart', Object.keys(data.incomesByCategory), Object.values(data.incomesByCategory), CHART_PALETTE);
        }

        function createDonutChart(canvasId, labels, data, bgColors) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            if (charts[canvasId]) charts[canvasId].destroy();
            if (data.length === 0 || data.every(v => v === 0)) { labels = ['ไม่มีข้อมูล']; data = [1]; bgColors = [CHART_EMPTY]; }
            charts[canvasId] = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: labels, datasets: [{ data: data, backgroundColor: bgColors }] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    // Draw-in on first render (§6); skipped under reduced-motion
                    animation: REDUCED_MOTION ? false : { animateRotate: true, animateScale: true, duration: 600, easing: 'easeOutQuart' },
                    plugins: { legend: { position: 'bottom', labels: { font: { family: 'Kanit' } } } }
                }
            });
        }

        window.onload = main;
    </script>
</body>

</html>
