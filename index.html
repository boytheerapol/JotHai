<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JotHai Dashboard</title>

    <!-- นำเข้าฟอนต์ Kanit -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- นำเข้า LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Kanit", sans-serif;
            background: linear-gradient(to right, #edf2f4, #d9e9f5);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 400px;
            padding: 30px 20px;
            text-align: center;
        }

        h1 {
            color: #03a9f4;
            margin-bottom: 5px;
            font-size: 26px;
        }

        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 15px auto;
            display: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-family: "Kanit", sans-serif;
            background-color: #1DB446;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s ease;
            font-weight: 500;
        }

        .btn:hover {
            background-color: #179038;
        }

        #status {
            margin-top: 15px;
            font-weight: 500;
            color: #555;
            font-size: 16px;
            line-height: 1.5;
        }

        .success {
            color: #1DB446;
            font-size: 18px;
            font-weight: bold;
        }

        .error {
            color: #f44336;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📊 JotHai Dashboard</h1>
        <img id="profile-image" class="profile-img" src="" alt="Profile">
        <div id="status">⏳ กำลังเตรียมการเชื่อมต่อ...</div>
        <div id="action-area"></div>
    </div>

    <script>
        // LIFF ID ล่าสุดของคุณ
        const liffId = "2010529543-LkVEFzhx";

        const statusEl = document.getElementById('status');
        const actionArea = document.getElementById('action-area');
        const profileImg = document.getElementById('profile-image');

        async function main() {
            try {
                await liff.init({
                    liffId: liffId,
                    withLoginOnExternalBrowser: true
                });

                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();

                    // แสดงรูปโปรไฟล์ถ้ามี
                    if (profile.pictureUrl) {
                        profileImg.src = profile.pictureUrl;
                        profileImg.style.display = "block";
                    }

                    statusEl.innerHTML = `<span class="success">สวัสดีคุณ ${profile.displayName} 🎉</span><br><br>เชื่อมต่อ LIFF บน Vercel สำเร็จ 100% ลื่นไหลแน่นอนครับ!`;
                    actionArea.innerHTML = '';
                } else {
                    statusEl.innerHTML = '<span class="error">กรุณายืนยันตัวตนเพื่อใช้งาน</span>';
                    actionArea.innerHTML = `<button class="btn" onclick="liff.login()">🚀 เข้าสู่ระบบด้วย LINE</button>`;
                }
            } catch (err) {
                console.error(err);
                statusEl.innerHTML = `<span class="error">ข้อผิดพลาด: ${err.message}</span>`;
            }
        }

        // เริ่มทำงานทันทีที่โหลดหน้าเว็บเสร็จ
        window.onload = main;
    </script>
</body>

</html>
