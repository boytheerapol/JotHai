<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JotHai — สรุปการเงิน</title>

  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />

  <!-- Classic scripts (globals: liff, Chart, Swal) load before the ES module -->
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
  <div class="app">
    <!-- §7.11 Global month-nav header (persists across all tabs) -->
    <header class="card app-header">
      <div class="month-nav">
        <button class="month-arrow" id="prev-month" aria-label="เดือนก่อนหน้า">&lsaquo;</button>
        <button class="month-label" id="month-label">
          <span id="month-text">—</span>
          <input type="month" id="month-input" class="month-input-hidden" aria-label="เลือกเดือน">
        </button>
        <button class="month-arrow" id="next-month" aria-label="เดือนถัดไป">&rsaquo;</button>
      </div>
      <div class="summary-strip">
        <div class="summary-cell">
          <span class="summary-cap">รายรับ</span>
          <span class="summary-amt income" id="sum-income">฿0</span>
        </div>
        <div class="summary-cell">
          <span class="summary-cap">รายจ่าย</span>
          <span class="summary-amt expense" id="sum-expense">฿0</span>
        </div>
        <div class="summary-cell">
          <span class="summary-cap">คงเหลือ</span>
          <span class="summary-amt income" id="sum-balance">฿0</span>
        </div>
      </div>
    </header>

    <!-- §7.1 Four-way tab bar -->
    <nav class="tabs" id="tabs">
      <div class="tab-indicator" id="tab-indicator"></div>
      <button class="tab-btn active" data-tab="overview">ภาพรวม</button>
      <button class="tab-btn" data-tab="categories">หมวดหมู่</button>
      <button class="tab-btn" data-tab="trend">เทียบเดือน</button>
      <button class="tab-btn" data-tab="entries">รายการ</button>
    </nav>

    <div id="loading" class="loading">
      <span>กำลังโหลดข้อมูล...</span>
      <span class="spinner" aria-hidden="true"></span>
    </div>

    <main>
      <section id="view-overview" class="view" hidden></section>
      <section id="view-categories" class="view" hidden></section>
      <section id="view-trend" class="view" hidden></section>
      <section id="view-entries" class="view" hidden></section>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>

</html>
